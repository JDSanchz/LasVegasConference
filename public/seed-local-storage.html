<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seed Local Storage</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      main {
        max-width: 720px;
        padding: 24px;
        border: 1px solid #374151;
        border-radius: 12px;
        background: #1f2937;
      }

      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Local storage seeded</h1>
      <p id="status">Processing...</p>
      <p><a href="/">Go to app</a></p>
    </main>

    <script type="module">
      const storageKey = "lv_conf_leads";
      const companyNames = [
        "Tesla",
        "Ford",
        "Dell Technologies",
        "Microsoft",
        "Google",
        "Amazon",
        "Apple",
        "NVIDIA",
        "Salesforce",
        "Oracle",
        "Cisco",
        "Adobe",
      ];
      const utmSources = ["linkedin", "google", "newsletter", "x", "youtube", "partner"];
      const utmMediums = ["paid_social", "cpc", "email", "organic_social", "video", "referral"];
      const utmCampaigns = [
        "executive-roundtable-2026",
        "spring-growth-summit",
        "pipeline-acceleration",
        "ai-leadership-series",
        "partner-invite-program",
        "vip-networking-drive",
      ];
      const params = new URLSearchParams(window.location.search);
      const requestedCount = Number.parseInt(params.get("count") || "150", 10);
      const count = Number.isInteger(requestedCount) && requestedCount > 0 ? requestedCount : 150;
      const clearExisting = params.get("clear") === "1";
      const status = document.getElementById("status");

      function createId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      }

      function readCurrentLeads() {
        try {
          const raw = localStorage.getItem(storageKey);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function createLead(index) {
        const number = index + 1;
        const roles = ["CEO", "COO", "VP Sales", "Head of Growth", "Founder"];
        const now = new Date().toISOString();
        const company = companyNames[index % companyNames.length];

        return {
          id: createId(),
          firstName: `Browser${number}`,
          lastName: `Lead${number}`,
          email: `browser.lead${number}@example.com`,
          jobTitle: roles[index % roles.length],
          socialHandle: `@browserlead${number}`,
          company,
          utm: {
            utm_source: utmSources[index % utmSources.length],
            utm_medium: utmMediums[index % utmMediums.length],
            utm_campaign: utmCampaigns[index % utmCampaigns.length],
            utm_content: `entry-${number}`,
          },
          submittedAt: now,
          landingPath: "/",
          landingHost: window.location.host,
          createdAt: now,
        };
      }

      const startLength = clearExisting ? 0 : readCurrentLeads().length;
      const leads = clearExisting ? [] : readCurrentLeads();
      const generated = Array.from({ length: count }, (_, index) => createLead(index));
      leads.push(...generated);
      localStorage.setItem(storageKey, JSON.stringify(leads));

      const finalLength = leads.length;
      status.textContent =
        `Added ${count} leads to this browser profile. ` +
        `Total now: ${finalLength}. ` +
        `(Started with ${startLength}, clear=${clearExisting ? "yes" : "no"})`;
    </script>
  </body>
</html>
